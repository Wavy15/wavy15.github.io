<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Accueil</title>

<style>
body {
  margin: 0;
  background: black;
  color: #66ff66;
  font-family: monospace;
  overflow: hidden;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* TERMINAL */
.terminal {
  position: relative;
  z-index: 1;
  padding: 30px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  height: 100vh;
}

/* TITRE */
h1 {
  margin-bottom: 20px;
}

/* BOUTONS STYLÉS */
.btn {
  display: inline-block;
  margin: 10px 10px 0 0;
  padding: 12px 20px;
  border: 1px solid rgba(102,255,102,0.4);
  color: #66ff66;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}

/* glow */
.btn:hover {
  color: #ccffcc;
  border-color: #99ff99;
  box-shadow: 0 0 10px #66ff66, 0 0 20px rgba(102,255,102,0.5);
}

/* scan effect */
.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(102,255,102,0.4), transparent);
  transition: 0.5s;
}

.btn:hover::before {
  left: 100%;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="terminal">
  <h1>&gt; Accueil</h1>

  <p>Bienvenue sur mon portfolio</p>
  <p>&gt; Accès :</p>

  <a href="#" class="btn">Projets</a>
  <a href="#" class="btn">Profil</a>
  <a href="#" class="btn">Compétences</a>
</div>

<script>
// MATRIX
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = Array(columns).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const colors = ["#33ff33", "#66ff66", "#99ff99"];
    ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];

    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height) drops[i] = 0;
    drops[i]++;
  }
}

setInterval(draw, 50);
</script>

</body>
</html>
