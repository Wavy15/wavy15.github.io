<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Accueil</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}


canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}


.terminal {
  position: relative;
  z-index: 1;
  padding: 30px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  height: 100vh;
  display: none;
}


.cursor {
  display: inline-block;
  width: 10px;
  height: 18px;
  background: #00ff00;
  margin-left: 5px;
  animation: blink 1s infinite;
}
@keyframes blink { 50% { opacity: 0; } }


.btn {
  display: inline-block;
  margin: 10px 10px 0 0;
  padding: 12px 20px;
  border: 1px solid rgba(0,255,0,0.4);
  color: #00ff00;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}

.btn:hover {
  color: #ccffcc;
  border-color: #99ff99;
  box-shadow: 0 0 10px #00ff00, 0 0 20px rgba(0,255,0,0.5);
}

.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(0,255,0,0.4), transparent);
  transition: 0.5s;
}

.btn:hover::before {
  left: 100%;
}

.btn:active {
  transform: scale(0.95);
}


#boot {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: #00ff00;
  padding: 20px;
  z-index: 2;
  transition: opacity 0.5s ease;
}

#boot-text {
  white-space: pre-wrap;
  font-size: 14px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>


<div id="boot">
  <pre id="boot-text"></pre>
</div>


<div class="terminal">
  <h1 id="title"></h1>
  <p>Bienvenue sur mon portfolio</p>
  <p>&gt; Accès :</p>

  <a href="projets.html" class="btn">Projets</a>
  <a href="profil.html" class="btn">Profil</a>
  <a href="competences.html" class="btn">Compétences</a>
</div>

<script>

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
const fontSize = 16;
const columns = Math.floor(width / fontSize);
const drops = [];
for (let i = 0; i < columns; i++) drops[i] = Math.random() * height;

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, width, height);
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const colors = ["#33ff33", "#66ff66", "#99ff99", "#ccffcc"];
    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];

    const text = letters.charAt(Math.floor(Math.random() * letters.length));
    ctx.fillText(text, i * fontSize, drops[i]);

    if (drops[i] > height && Math.random() > 0.975) drops[i] = 0;
    drops[i] += fontSize;
  }
}
setInterval(drawMatrix, 50);

window.addEventListener("resize", ()=>{
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
});


const bootLines = [
"[    0.000000] Booting Kali Linux...",
"[    0.523421] Loading kernel modules...",
"[    1.124532] Initializing network interfaces...",
"[    1.845223] Starting system services...",
"[    2.345623] Mounting file systems...",
"[    2.800000] Bypassing security protocols...",
"[    2.945123] Launching terminal...",
"[    3.500000] Access granted ✔",
"",
"root@kali:~#"
];

let i = 0;
function bootSequence() {
  const el = document.getElementById("boot-text");
  if (i < bootLines.length) {
    el.innerHTML += bootLines[i] + "\n";
    i++;
    setTimeout(bootSequence, 200);
  } else {
    setTimeout(() => {
      const boot = document.getElementById("boot");
      boot.style.opacity = "0";
      setTimeout(()=> boot.style.display="none", 500);

      document.querySelector(".terminal").style.display="block";
      typeTitle();
    }, 800);
  }
}


const text = "> Accueil";
let j = 0;
function typeTitle() {
  const el = document.getElementById("title");
  if (j < text.length) {
    el.innerHTML += text[j];
    j++;
    setTimeout(typeTitle, 80);
  } else {
    el.innerHTML += '<span class="cursor"></span>';
  }
}

window.onload = bootSequence;
</script>

</body>
</html>
