<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Accueil</title>

<style>
body {
  margin: 0;
  background: black;
  color: #66ff66;
  font-family: monospace;
  overflow: hidden;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* TERMINAL */
.terminal {
  position: relative;
  z-index: 1;
  padding: 30px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  height: 100vh;
  display: none;
}

/* CURSEUR */
.cursor {
  display: inline-block;
  width: 10px;
  height: 18px;
  background: #66ff66;
  margin-left: 5px;
  animation: blink 1s infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* BOUTONS */
.btn {
  display: inline-block;
  margin: 10px 10px 0 0;
  padding: 12px 20px;
  border: 1px solid rgba(102,255,102,0.4);
  color: #66ff66;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}

/* HOVER */
.btn:hover {
  color: #ccffcc;
  border-color: #99ff99;
  box-shadow: 0 0 10px #66ff66, 0 0 20px rgba(102,255,102,0.5);
}

/* SCAN */
.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(102,255,102,0.4), transparent);
  transition: 0.5s;
}
.btn:hover::before {
  left: 100%;
}

/* BOOT SCREEN */
#boot {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: #66ff66;
  padding: 20px;
  z-index: 2;
}

#boot-text {
  white-space: pre-wrap;
  font-size: 14px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- BOOT -->
<div id="boot">
  <pre id="boot-text"></pre>
</div>

<!-- TERMINAL -->
<div class="terminal">
  <h1 id="title"></h1>

  <p>Bienvenue sur mon portfolio</p>
  <p>&gt; Accès :</p>

  <a href="projets.html" class="btn">Projets</a>
<a href="profil.html" class="btn">Profil</a>
<a href="competences.html" class="btn">Compétences</a>
</div>

<script>
// MATRIX
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = Array(columns).fill(1);

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const colors = ["#33ff33", "#66ff66", "#99ff99"];
    ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];

    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height) drops[i] = 0;
    drops[i]++;
  }
}

setInterval(drawMatrix, 50);

// BOOT TEXT
const bootLines = [
"[ OK ] Booting Kali Linux...",
"[ OK ] Loading modules...",
"[ OK ] Initializing network...",
"[ OK ] Starting services...",
"[ OK ] Mounting systems...",
"[ OK ] Launching terminal...",
"[ OK ] Access granted ✔",
"",
"root@kali:~#"
];

let i = 0;

function bootSequence() {
  const el = document.getElementById("boot-text");

  if (i < bootLines.length) {
    el.innerHTML += bootLines[i] + "\n";
    i++;
    setTimeout(bootSequence, 200);
  } else {
    setTimeout(() => {
      document.getElementById("boot").style.display = "none";
      document.querySelector(".terminal").style.display = "block";
      typeTitle();
    }, 800);
  }
}

// TYPING TITLE
const text = "> Accueil";
let j = 0;

function typeTitle() {
  const el = document.getElementById("title");

  if (j < text.length) {
    el.innerHTML += text[j];
    j++;
    setTimeout(typeTitle, 80);
  } else {
    el.innerHTML += '<span class="cursor"></span>';
  }
}

// START
window.onload = bootSequence;
</script>

</body>
</html>
