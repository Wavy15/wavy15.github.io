<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Accueil</title>

<style>
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  width: 100vw;
  font-family: "Courier New", monospace;
  color: #00ff00;
  overflow: hidden;
}

#matrix {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background: black;
}

.terminal-box {
  width: 100vw;
  height: 100vh;
  border: 2px solid #00ff00;
  box-shadow: 0 0 20px #00ff00;
  padding: 20px;
  box-sizing: border-box;
  display: none;
  flex-direction: column;
  justify-content: flex-start;
  position: relative;
  z-index: 1;
}

.cursor {
  display: inline-block;
  width: 10px;
  height: 20px;
  background: #00ff00;
  margin-left: 5px;
  animation: blink 1s infinite;
}
@keyframes blink { 50% { opacity: 0; } }


.btn {
  display: block;
  margin: 15px auto;
  padding: 12px 25px;
  color: #66ff66;
  border: 1px solid rgba(102,255,102,0.4);
  text-decoration: none;
  width: fit-content;
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: fadeIn 1s forwards;
  letter-spacing: 1px;
  transition: all 0.3s ease;
  backdrop-filter: blur(2px);
}


.btn:nth-of-type(1) { animation-delay: 0.5s; }
.btn:nth-of-type(2) { animation-delay: 1s; }
.btn:nth-of-type(3) { animation-delay: 1.5s; }


.btn:hover {
  color: #ccffcc;
  border-color: #99ff99;
  box-shadow: 
    0 0 5px #66ff66,
    0 0 15px rgba(102,255,102,0.5),
    inset 0 0 10px rgba(102,255,102,0.2);
}


.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -120%;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(102,255,102,0.4),
    transparent
  );
  transition: 0.6s;
}

.btn:hover::before {
  left: 120%;
}


.btn::after {
  content: "";
  position: absolute;
  inset: 0;
  border: 1px solid transparent;
  background: linear-gradient(90deg, transparent, #66ff66, transparent) border-box;
  mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
  mask-composite: exclude;
  opacity: 0;
  transition: 0.3s;
}

.btn:hover::after {
  opacity: 1;
}


.btn:active {
  transform: scale(0.95);
  box-shadow: 0 0 5px #00ff00;
}

#boot-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: #00ff00;
  font-family: "Courier New", monospace;
  padding: 20px;
  z-index: 2;
}
#boot-text { white-space: pre-wrap; font-size: 14px; }
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="boot-screen">
  <pre id="boot-text"></pre>
</div>

<div class="terminal-box">
  <h1>&gt; Accueil<span class="cursor"></span></h1>
  <h2>&gt; Bienvenue sur mon portfolio</h2>
  <p>Étudiant en cybersécurité web spécialisé en pentesting.</p>
  <p>&gt; Explorez mes projets, mon profil et mes compétences.</p>
  <p>&gt; Accès :</p>
  <a href="projets.html" class="btn">[ Voir les projets ]</a>
  <a href="profil.html" class="btn">[ Voir le profil ]</a>
  <a href="competences.html" class="btn">[ Voir les compétences ]</a>
</div>

<script>
// MATRIX
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
const fontSize = 16;
const columns = Math.floor(width / fontSize);
const drops = [];
for (let x = 0; x < columns; x++) drops[x] = Math.random() * height;

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.08)"; // fond légèrement plus sombre
  ctx.fillRect(0, 0, width, height);

  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const colors = ["#33ff33", "#66ff66", "#99ff99", "#ccffcc"];
    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];

    const text = letters.charAt(Math.floor(Math.random() * letters.length));
    ctx.fillText(text, i * fontSize, drops[i]);

    if (drops[i] > height && Math.random() > 0.975) drops[i] = 0;
    drops[i] += fontSize;
  }
}
setInterval(drawMatrix, 50);

window.addEventListener("resize", ()=>{
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
});

// BOOT SCREEN
const bootLines = [
"[    0.000000] Booting Kali Linux...",
"[    0.523421] Loading kernel modules...",
"[    1.124532] Initializing network interfaces...",
"[    1.845223] Starting system services...",
"[    2.345623] Mounting file systems...",
"[    2.800000] Bypassing security protocols...",
"[    2.945123] Launching terminal...",
"[    3.500000] Access granted ✔",
"",
"root@kali:~#"
];

let i = 0;
function typeLine() {
  const textElement = document.getElementById("boot-text");
  if (i < bootLines.length) {
    textElement.innerHTML += bootLines[i] + "\n";
    i++;
    setTimeout(typeLine, 250);
  } else {
    setTimeout(()=>{
      document.getElementById("boot-screen").style.display="none";
      document.querySelector(".terminal-box").style.display="flex";
    },1000);
  }
}

// ATTEND QUE LE DOM SOIT CHARGÉ
window.addEventListener("DOMContentLoaded", typeLine);
</script>

</body>
</html>
