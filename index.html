<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Accueil</title>

<style>
/* Full-screen body */
body {
  background-color: black;
  margin: 0;
  padding: 0;
  height: 100vh;
  width: 100vw;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Courier New", monospace;
  color: #00ff00;
}

/* Terminal box */
.terminal-box {
  width: 100vw;
  height: 100vh;
  border: 2px solid #00ff00;
  box-shadow: 0 0 20px #00ff00;
  padding: 20px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}

/* Curseur clignotant */
.cursor {
  display: inline-block;
  width: 10px;
  height: 20px;
  background: #00ff00;
  margin-left: 5px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* Boutons style terminal */
.btn {
  display: block;
  margin: 10px auto;
  padding: 10px 20px;
  color: #00ff00;
  border: 1px solid #00ff00;
  text-decoration: none;
  width: fit-content;
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: fadeIn 1s forwards;
}

/* Apparition progressive */
.btn:nth-of-type(1) { animation-delay: 0.5s; }
.btn:nth-of-type(2) { animation-delay: 1s; }
.btn:nth-of-type(3) { animation-delay: 1.5s; }

/* Hover (tout regroupé proprement) */
.btn:hover {
  background-color: #00ff00;
  color: black;
  box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
  animation: glitch 0.4s infinite;
}

/* Effet scan */
.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, #00ff00, transparent);
  transition: 0.5s;
}

.btn:hover::before {
  left: 100%;
}

/* Animation apparition */
@keyframes fadeIn {
  to { opacity: 1; }
}

/* Animation glitch */
@keyframes glitch {
  0% { transform: translate(0); }
  25% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  75% { transform: translate(2px, 2px); }
  100% { transform: translate(0); }
}
</style>
</head>

<body>

<div class="terminal-box">

  <h1>&gt; Accueil<span class="cursor"></span></h1>
  <h2>&gt; Bienvenue sur mon portfolio</h2>

  <p>Étudiant en cybersécurité web spécialisé en pentesting.</p>
  <p>&gt; Explorez mes projets, mon profil et mes compétences.</p>

  <p>&gt; Accès :</p>

  <a href="projets.html" class="btn">[ Voir les projets ]</a>
  <a href="profil.html" class="btn">[ Voir le profil ]</a>
  <a href="competences.html" class="btn">[ Voir les compétences ]</a>

</div>

</body>
</html>
